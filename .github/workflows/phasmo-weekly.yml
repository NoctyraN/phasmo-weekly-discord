name: Phasmophobia Weekly Discord Post

on:
  schedule:
    # Phasmophobia Weekly wechselt Montag 00:00 UTC.
    # GitHub läuft ebenfalls nach UTC.
    # Deshalb posten wir Montag 00:15 UTC, also kurz nach dem Wechsel.
    - cron: "15 0 * * 1"

  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install cheerio --no-save

      - name: Post weekly challenge to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node .github/phasmo-weekly.js
