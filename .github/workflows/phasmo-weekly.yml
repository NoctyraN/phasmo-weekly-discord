name: Phasmophobia Weekly Discord Post

on:
  schedule:
    - cron: "15 11 * * 1"
    - cron: "15 12 * * 1"

  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Check German time
        id: timecheck
        run: |
          HOUR=$(TZ=Europe/Berlin date +%H)
          DAY=$(TZ=Europe/Berlin date +%u)

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_post=true" >> "$GITHUB_OUTPUT"
          elif [ "$DAY" = "1" ] && [ "$HOUR" = "13" ]; then
            echo "run_post=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_post=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.timecheck.outputs.run_post == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.timecheck.outputs.run_post == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.timecheck.outputs.run_post == 'true'
        run: npm install cheerio

      - name: Post weekly challenge to Discord
        if: steps.timecheck.outputs.run_post == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node .github/phasmo-weekly.js
